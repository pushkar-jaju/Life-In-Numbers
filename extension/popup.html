<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      background: #09090b;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-item {
      background: #111827;
      border: 1px solid #1a1a1f;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-label {
      font-size: 12px;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #7c3aed;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background: #1a1a1f;
      color: white;
      border: 1px solid #7c3aed;
    }

    .btn-secondary:hover {
      background: #7c3aed;
      background: opacity(0.1);
    }

    .status {
      background: #111827;
      border: 1px solid #1a1a1f;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      color: #a1a1aa;
    }

    .status.active {
      background: #1f4d3f;
      border-color: #22c55e;
      color: #22c55e;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #111827;
      border: 1px solid #1a1a1f;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .toggle label {
      flex: 1;
      font-size: 14px;
      cursor: pointer;
    }

    .toggle input {
      width: 40px;
      height: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span style="font-size: 20px">📊</span>
      <h1>Life in Numbers</h1>
    </div>

    <div class="stats">
      <div class="stat-item">
        <div class="stat-label">Keyboard Presses</div>
        <div class="stat-value" id="keyPresses">0</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Tabs Opened</div>
        <div class="stat-value" id="tabsOpened">0</div>
      </div>
    </div>

    <div class="toggle">
      <label for="trackingToggle">Tracking Enabled</label>
      <input type="checkbox" id="trackingToggle" checked />
    </div>

    <div class="buttons">
      <button class="btn-primary" id="openDashboard">Dashboard</button>
      <button class="btn-secondary" id="resetStats">Reset</button>
    </div>

    <div class="status active" id="status">✓ Tracking active</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
